server:
  port: 8080
spring:
  application:
    name: platform-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: video-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/videos/**
        - id: social-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/social/**, /api/chat/**
        - id: social-ws
          uri: ws://localhost:8083
          predicates:
            - Path=/ws/**
security:
  jwt:
    secret: video-platform-demo-secret-video-platform-demo-secret
    access-expire-seconds: 1800
    refresh-expire-seconds: 604800
